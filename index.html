<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>DxBang – Static Projects</title>
	<style>
		*, *::before, *::after {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		:root {
			--bg: #0d1117;
			--surface: #161b22;
			--border: #30363d;
			--accent: #58a6ff;
			--accent-hover: #79c0ff;
			--text: #c9d1d9;
			--text-muted: #8b949e;
			--radius: 8px;
		}

		body {
			background: var(--bg);
			color: var(--text);
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
			min-height: 100vh;
			display: flex;
			flex-direction: column;
		}

		header {
			border-bottom: 1px solid var(--border);
			padding: 1.5rem 2rem;
			display: flex;
			align-items: center;
			gap: 1rem;
		}

		header h1 {
			font-size: 1.4rem;
			font-weight: 600;
			color: var(--text);
		}

		header h1 span {
			color: var(--accent);
		}

		header p {
			color: var(--text-muted);
			font-size: 0.9rem;
		}

		main {
			flex: 1;
			max-width: 1100px;
			width: 100%;
			margin: 0 auto;
			padding: 2.5rem 2rem;
		}

		.section-title {
			font-size: 1rem;
			font-weight: 600;
			color: var(--text-muted);
			text-transform: uppercase;
			letter-spacing: 0.08em;
			margin-bottom: 1.25rem;
		}

		.projects {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
			gap: 1rem;
		}

		.card {
			background: var(--surface);
			border: 1px solid var(--border);
			border-radius: var(--radius);
			padding: 1.25rem 1.5rem;
			display: flex;
			flex-direction: column;
			gap: 0.6rem;
			text-decoration: none;
			color: inherit;
			transition: border-color 0.15s ease, background 0.15s ease;
		}

		.card:hover {
			border-color: var(--accent);
			background: #1c2128;
		}

		.card-name {
			font-size: 1rem;
			font-weight: 600;
			color: var(--accent);
		}

		.card:hover .card-name {
			color: var(--accent-hover);
		}

		.card-desc {
			font-size: 0.875rem;
			color: var(--text-muted);
			line-height: 1.5;
			flex: 1;
		}

		.card-tag {
			display: inline-block;
			font-size: 0.75rem;
			color: var(--text-muted);
			background: #21262d;
			border: 1px solid var(--border);
			border-radius: 2em;
			padding: 0.15em 0.65em;
			width: fit-content;
		}

		footer {
			border-top: 1px solid var(--border);
			padding: 1.25rem 2rem;
			text-align: center;
			font-size: 0.8rem;
			color: var(--text-muted);
		}

		footer a {
			color: var(--accent);
			text-decoration: none;
		}

		footer a:hover {
			text-decoration: underline;
		}
	</style>
</head>
<body>
	<header>
		<div>
			<h1><span>DxBang</span> / projects</h1>
			<p>A collection of static projects hosted on GitHub Pages.</p>
		</div>
	</header>

	<main>
		<p class="section-title">Projects</p>
		<div class="projects">
			<!-- Add project cards here.
			     Example:
			<a class="card" href="/project-name/">
				<span class="card-name">project-name</span>
				<span class="card-desc">Short description of the project.</span>
				<span class="card-tag">html</span>
			</a>
			-->
			<a class="card" href="/forza-color/">
				<span class="card-name">forza-color</span>
				<span class="card-desc">Convert any color into the paint color values used in Forza Motorsport &amp; Forza Horizon.</span>
				<span class="card-tag">html</span>
			</a>
			<a class="card" href="https://github.com/DxBang" target="_blank" rel="noopener">
				<span class="card-name">GitHub Profile</span>
				<span class="card-desc">Browse all repositories and source code on GitHub.</span>
				<span class="card-tag">github</span>
			</a>
		</div>
	</main>

	<footer>
		<p>&copy; <span id="year"></span> <a href="https://github.com/DxBang" target="_blank" rel="noopener">DxBang</a>. Hosted on GitHub Pages.</p>
	</footer>
	<script>
		document.getElementById('year').textContent = new Date().getFullYear();
	</script>
</body>
</html>
